    <canvas id="bg-grid"></canvas>

    <script>
        const titleEl = document.querySelector('#container__title h1');
        const originalText = titleEl.textContent;
        titleEl.innerHTML = originalText.split('').map((ch, i) =>
            `<span class="letter" style="animation-delay:${0.1 + i * 0.12}s">${ch === ' ' ? '&nbsp;' : ch}</span>`
        ).join('');

        const canvas = document.getElementById('bg-grid');
        const ctx = canvas.getContext('2d');
        const SPACING = 55;
        const INFLUENCE = 140;
        const STRENGTH = 45;
        let W, H, cols, rows, pts;
        let mouse = { x: -9999, y: -9999 };

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            if (titleEl) {
                const rect = titleEl.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = (e.clientX - cx) / window.innerWidth;
                const dy = (e.clientY - cy) / window.innerHeight;
                titleEl.style.transform =
    `rotate(-90deg) translate(${-dx * -10}px, ${-dy * 8}px) skewX(${-dx * 2}deg)`;
            }
        });

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cols = Math.ceil(W / SPACING) + 2;
            rows = Math.ceil(H / SPACING) + 2;
            pts = [];
            for (let r = 0; r < rows; r++)
                for (let c = 0; c < cols; c++)
                    pts.push({ ox: c * SPACING, oy: r * SPACING });
        }

        window.addEventListener('resize', resize);

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const displaced = pts.map(p => {
                const dx = p.ox - mouse.x;
                const dy = p.oy - mouse.y;
                const dist = Math.hypot(dx, dy);
                if (dist < INFLUENCE && dist > 0) {
                    const force = (1 - dist / INFLUENCE) * STRENGTH;
                    return { x: p.ox + (dx / dist) * force, y: p.oy + (dy / dist) * force };
                }
                return { x: p.ox, y: p.oy };
            });

            ctx.lineWidth = 0.8;
            for (let r = 0; r < rows; r++) {
                ctx.beginPath();
                for (let c = 0; c < cols; c++) {
                    const p = displaced[r * cols + c];
                    c === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.13)';
                ctx.stroke();
            }

            for (let c = 0; c < cols; c++) {
                ctx.beginPath();
                for (let r = 0; r < rows; r++) {
                    const p = displaced[r * cols + c];
                    r === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.13)';
                ctx.stroke();
            }

            displaced.forEach((p, i) => {
                const dx = pts[i].ox - mouse.x;
                const dy = pts[i].oy - mouse.y;
                const dist = Math.hypot(dx, dy);
                if (dist < INFLUENCE) {
                    const alpha = (1 - dist / INFLUENCE) * 0.75;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,0,0,${alpha})`;
                    ctx.fill();
                }
            });
            requestAnimationFrame(draw);
        }
        resize();
        draw();
    </script>
